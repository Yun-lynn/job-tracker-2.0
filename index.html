<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>求职追踪表 ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f5ff;
    --surface: #ffffff;
    --border: #e8e4f3;
    --text: #1a1535;
    --muted: #7c6fa0;
    --radius: 14px;
    --shadow: 0 2px 12px rgba(120,80,200,0.08);

    --c1: #7c3aed; --c1l: #ede9fe;
    --c2: #0ea5e9; --c2l: #e0f2fe;
    --c3: #10b981; --c3l: #d1fae5;
    --c4: #f59e0b; --c4l: #fef3c7;
    --c5: #ef4444; --c5l: #fee2e2;
    --c6: #ec4899; --c6l: #fce7f3;
    --c7: #8b5cf6; --c7l: #ede9fe;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #7c3aed 0%, #ec4899 50%, #0ea5e9 100%);
    padding: 2rem 2rem 3.5rem;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -60px; left: 30%;
    width: 280px; height: 280px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
  }
  .header-inner { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; }
  .header h1 { font-size: 2rem; font-weight: 800; color: #fff; letter-spacing: -0.02em; }
  .header p { color: rgba(255,255,255,0.8); font-size: 0.9rem; margin-top: 4px; }

  /* Stats */
  .stats-wrap {
    max-width: 1200px;
    margin: -1.5rem auto 0;
    padding: 0 2rem;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    position: relative;
    z-index: 2;
  }
  .stat {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 1rem 1.2rem;
    box-shadow: var(--shadow);
    border-top: 4px solid transparent;
    transition: transform 0.15s;
  }
  .stat:hover { transform: translateY(-2px); }
  .stat:nth-child(1) { border-color: #7c3aed; }
  .stat:nth-child(2) { border-color: #0ea5e9; }
  .stat:nth-child(3) { border-color: #10b981; }
  .stat:nth-child(4) { border-color: #ef4444; }
  .stat:nth-child(5) { border-color: #ec4899; }
  .stat-num { font-size: 1.8rem; font-weight: 800; line-height: 1; }
  .stat:nth-child(1) .stat-num { color: #7c3aed; }
  .stat:nth-child(2) .stat-num { color: #0ea5e9; }
  .stat:nth-child(3) .stat-num { color: #10b981; }
  .stat:nth-child(4) .stat-num { color: #ef4444; }
  .stat:nth-child(5) .stat-num { color: #ec4899; }
  .stat-label { font-size: 0.72rem; color: var(--muted); margin-top: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }

  /* Main */
  .main { max-width: 1200px; margin: 1.5rem auto; padding: 0 2rem 3rem; }

  /* Toolbar */
  .toolbar {
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    background: var(--surface); border-radius: var(--radius);
    padding: 1rem 1.25rem; box-shadow: var(--shadow);
    margin-bottom: 1rem;
  }
  .toolbar input[type="text"] {
    flex: 1; min-width: 180px;
    padding: 8px 14px; border-radius: 30px;
    border: 2px solid var(--border);
    font-family: 'Nunito', sans-serif; font-size: 13px;
    background: var(--bg); color: var(--text);
    outline: none; transition: border 0.2s;
  }
  .toolbar input[type="text"]:focus { border-color: #7c3aed; }
  .toolbar select {
    padding: 8px 14px; border-radius: 30px;
    border: 2px solid var(--border);
    font-family: 'Nunito', sans-serif; font-size: 13px;
    background: var(--bg); color: var(--text);
    outline: none; cursor: pointer; transition: border 0.2s;
  }
  .toolbar select:focus { border-color: #7c3aed; }
  .btn {
    padding: 8px 18px; border-radius: 30px;
    font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700;
    cursor: pointer; border: none; transition: all 0.15s;
  }
  .btn-add { background: linear-gradient(135deg, #7c3aed, #ec4899); color: #fff; }
  .btn-add:hover { opacity: 0.88; transform: scale(1.02); }
  .btn-export { background: var(--bg); color: var(--muted); border: 2px solid var(--border); }
  .btn-export:hover { border-color: #7c3aed; color: #7c3aed; }

  /* Table */
  .table-card {
    background: var(--surface); border-radius: var(--radius);
    box-shadow: var(--shadow); overflow: hidden;
  }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 900px; }
  thead th {
    background: #faf8ff; color: var(--muted);
    font-size: 11px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 0.06em;
    padding: 12px 14px; text-align: left;
    border-bottom: 2px solid var(--border);
    cursor: pointer; white-space: nowrap; user-select: none;
  }
  thead th:hover { color: #7c3aed; }
  tbody tr { border-bottom: 1px solid #f3f0fb; transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #faf8ff; }
  td { padding: 11px 14px; vertical-align: middle; color: var(--text); }
  td.num { color: var(--muted); font-size: 11px; font-weight: 700; }
  td.company { font-weight: 700; }

  /* Badges */
  .badge {
    display: inline-block; font-size: 11px; font-weight: 700;
    padding: 3px 10px; border-radius: 30px; white-space: nowrap;
  }
  /* Status */
  .s-投递中   { background: #e0f2fe; color: #0369a1; }
  .s-待回复   { background: #f3f0fb; color: #6d28d9; }
  .s-已笔试   { background: #fef3c7; color: #92400e; }
  .s-已面试   { background: #d1fae5; color: #065f46; }
  .s-已offer  { background: #d1fae5; color: #065f46; border: 2px solid #10b981; }
  .s-已拒     { background: #fee2e2; color: #991b1b; }
  /* Priority */
  .p1 { background: #ede9fe; color: #5b21b6; }
  .p2 { background: #fce7f3; color: #9d174d; }
  .p3 { background: #d1fae5; color: #065f46; }
  .p4 { background: #fef3c7; color: #92400e; }
  .p5 { background: #fee2e2; color: #991b1b; }
  .p6 { background: #e0f2fe; color: #0369a1; }
  .p7 { background: #f3f4f6; color: #374151; }
  /* Channel */
  .ch { background: #f3f0fb; color: #5b21b6; }

  /* Networking check */
  .net-yes { color: #10b981; font-size: 16px; font-weight: 800; }
  .net-no  { color: #d1d5db; font-size: 13px; }

  /* Delete btn */
  .del-btn {
    background: none; border: none; cursor: pointer;
    color: #d1d5db; font-size: 15px; padding: 2px 6px;
    border-radius: 6px; transition: all 0.15s;
  }
  .del-btn:hover { color: #ef4444; background: #fee2e2; }

  /* Add row */
  .add-row { background: #faf8ff; }
  .add-row td { padding: 7px 10px; }
  .add-row input, .add-row select {
    width: 100%; padding: 5px 8px; border-radius: 8px;
    border: 2px solid #e8e4f3;
    font-family: 'Nunito', sans-serif; font-size: 12px;
    background: #fff; color: var(--text); outline: none;
  }
  .add-row input:focus, .add-row select:focus { border-color: #7c3aed; }
  .save-btn {
    background: linear-gradient(135deg, #7c3aed, #ec4899);
    border: none; border-radius: 8px; padding: 5px 12px;
    font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 700;
    color: #fff; cursor: pointer;
  }
  .save-btn:hover { opacity: 0.88; }

  .empty-row td {
    text-align: center; color: var(--muted);
    padding: 3rem; font-size: 14px;
  }

  /* Responsive */
  @media (max-width: 700px) {
    .stats-wrap { grid-template-columns: repeat(3, 1fr); }
    .header { padding: 1.5rem 1rem 3rem; }
    .main { padding: 0 1rem 2rem; }
    .stats-wrap { padding: 0 1rem; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <h1>✦ 求职追踪表</h1>
    <p>Job Application Tracker · LA → 全美</p>
  </div>
</div>

<div class="stats-wrap" id="stats-row"></div>

<div class="main">
  <div class="toolbar">
    <input type="text" id="search-input" placeholder="🔍  搜索公司 / 职位..." />
    <select id="filter-priority">
      <option value="">全部优先级</option>
      <option>Priority 1 中企在美分公司</option>
      <option>Priority 2 中企在美创业部</option>
      <option>Priority 3 美本土/华人startup</option>
      <option>Secondary 美本土/Latino startup</option>
      <option>Third 纯美startup</option>
      <option>Have a try LA大雇主</option>
      <option>Remote 全美远程</option>
    </select>
    <select id="filter-status">
      <option value="">全部状态</option>
      <option>投递中</option>
      <option>待回复</option>
      <option>已笔试</option>
      <option>已面试</option>
      <option>已offer</option>
      <option>已拒</option>
    </select>
    <button class="btn btn-add" onclick="toggleAddRow()">＋ 新增</button>
    <button class="btn btn-export" onclick="exportCSV()">导出 CSV ↓</button>
  </div>

  <div class="table-card">
    <div class="table-wrap">
      <table id="main-table">
        <thead>
          <tr>
            <th style="width:36px;">#</th>
            <th style="width:120px;" onclick="sortBy('company')">公司 ↕</th>
            <th style="width:140px;" onclick="sortBy('jd')">JD 职位 ↕</th>
            <th style="width:100px;" onclick="sortBy('date')">投递日期 ↕</th>
            <th style="width:88px;" onclick="sortBy('status')">状态 ↕</th>
            <th style="width:90px;" onclick="sortBy('channel')">投递渠道</th>
            <th style="width:88px;" onclick="sortBy('channelType')">渠道类型</th>
            <th style="width:160px;" onclick="sortBy('priority')">优先级分类 ↕</th>
            <th style="width:72px;">Networking</th>
            <th>备注</th>
            <th style="width:36px;"></th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const PRIORITIES = [
  'Priority 1 中企在美分公司',
  'Priority 2 中企在美创业部',
  'Priority 3 美本土/华人startup',
  'Secondary 美本土/Latino startup',
  'Third 纯美startup',
  'Have a try LA大雇主',
  'Remote 全美远程',
];
const STATUSES = ['投递中','待回复','已笔试','已面试','已offer','已拒'];
const CHANNELS = ['LinkedIn','Handshake','直接官网','Networking','猎聘','Indeed','Internal','其他'];
const CHANNEL_TYPES = ['职场平台','官方渠道','人脉推荐','猎头','其他'];
const P_CLASS = {
  'Priority 1 中企在美分公司':'p1',
  'Priority 2 中企在美创业部':'p2',
  'Priority 3 美本土/华人startup':'p3',
  'Secondary 美本土/Latino startup':'p4',
  'Third 纯美startup':'p5',
  'Have a try LA大雇主':'p6',
  'Remote 全美远程':'p7',
};

const SAMPLE = [
  {id:1,company:'霸王茶姬',jd:'Marketing Manager',date:'2026-04-01',status:'待回复',channel:'Networking',channelType:'人脉推荐',priority:'Priority 2 中企在美创业部',networking:'是',note:'已联系LA HR'},
  {id:2,company:'字节跳动',jd:'Operations Analyst',date:'2026-04-03',status:'已笔试',channel:'LinkedIn',channelType:'职场平台',priority:'Priority 1 中企在美分公司',networking:'是',note:'OA截止4/10'},
  {id:3,company:'腾讯美国',jd:'Business Development',date:'2026-04-05',status:'投递中',channel:'直接官网',channelType:'官方渠道',priority:'Priority 1 中企在美分公司',networking:'否',note:''},
  {id:4,company:'名创优品',jd:'Supply Chain Coordinator',date:'2026-04-06',status:'投递中',channel:'Handshake',channelType:'职场平台',priority:'Priority 2 中企在美创业部',networking:'否',note:''},
  {id:5,company:'Figma',jd:'Product Ops',date:'2026-04-07',status:'已拒',channel:'LinkedIn',channelType:'职场平台',priority:'Third 纯美startup',networking:'否',note:'HR电话未通过'},
];

let data = [];
try { data = JSON.parse(localStorage.getItem('jobApps2') || 'null') || SAMPLE.map(r=>({...r})); } catch(e) { data = SAMPLE.map(r=>({...r})); }
let nextId = Math.max(...data.map(r=>r.id), 0) + 1;
let sortKey = 'date', sortDir = -1, showAdd = false;

function save() { try { localStorage.setItem('jobApps2', JSON.stringify(data)); } catch(e){} }

function getFiltered() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const fp = document.getElementById('filter-priority').value;
  const fs = document.getElementById('filter-status').value;
  return data.filter(r => {
    if (q && !(r.company+r.jd+(r.note||'')).toLowerCase().includes(q)) return false;
    if (fp && r.priority !== fp) return false;
    if (fs && r.status !== fs) return false;
    return true;
  }).sort((a,b) => {
    let av = a[sortKey]||'', bv = b[sortKey]||'';
    return av < bv ? -sortDir : av > bv ? sortDir : 0;
  });
}

function renderStats() {
  const el = document.getElementById('stats-row');
  const stats = [
    {num: data.length, label: '总投递数'},
    {num: data.filter(r=>r.status==='已面试').length, label: '已面试'},
    {num: data.filter(r=>r.status==='已offer').length, label: '已 Offer 🎉'},
    {num: data.filter(r=>r.status==='已拒').length, label: '已拒信'},
    {num: data.filter(r=>r.networking==='是').length, label: 'Networking覆盖'},
  ];
  el.innerHTML = stats.map(s=>`<div class="stat"><div class="stat-num">${s.num}</div><div class="stat-label">${s.label}</div></div>`).join('');
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderTable() {
  renderStats();
  const rows = getFiltered();
  const tbody = document.getElementById('table-body');
  let html = '';
  if (!rows.length) {
    html = `<tr class="empty-row"><td colspan="11">🔍 暂无匹配记录</td></tr>`;
  } else {
    rows.forEach((r,i) => {
      const pc = P_CLASS[r.priority]||'p7';
      const sc = 's-'+(r.status||'投递中');
      html += `<tr>
        <td class="num">${i+1}</td>
        <td class="company">${esc(r.company)}</td>
        <td>${esc(r.jd)}</td>
        <td style="color:#7c6fa0;font-size:12px;">${r.date||''}</td>
        <td><span class="badge ${sc}">${r.status||''}</span></td>
        <td><span class="badge ch">${esc(r.channel)}</span></td>
        <td style="color:#7c6fa0;font-size:12px;">${esc(r.channelType)}</td>
        <td><span class="badge ${pc}" style="font-size:10px;">${esc(r.priority)}</span></td>
        <td style="text-align:center;">${r.networking==='是'?'<span class="net-yes">✓</span>':'<span class="net-no">—</span>'}</td>
        <td style="color:#7c6fa0;font-size:12px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(r.note||'')}</td>
        <td><button class="del-btn" onclick="deleteRow(${r.id})">✕</button></td>
      </tr>`;
    });
  }
  if (showAdd) {
    const today = new Date().toISOString().slice(0,10);
    html += `<tr class="add-row">
      <td></td>
      <td><input id="a-company" placeholder="公司名" /></td>
      <td><input id="a-jd" placeholder="职位名称" /></td>
      <td><input id="a-date" type="date" value="${today}" /></td>
      <td><select id="a-status">${STATUSES.map(s=>`<option>${s}</option>`).join('')}</select></td>
      <td><select id="a-channel">${CHANNELS.map(c=>`<option>${c}</option>`).join('')}</select></td>
      <td><select id="a-chtype">${CHANNEL_TYPES.map(t=>`<option>${t}</option>`).join('')}</select></td>
      <td><select id="a-priority">${PRIORITIES.map(p=>`<option>${p}</option>`).join('')}</select></td>
      <td><select id="a-net"><option>否</option><option>是</option></select></td>
      <td><input id="a-note" placeholder="备注" /></td>
      <td><button class="save-btn" onclick="addRow()">保存</button></td>
    </tr>`;
  }
  tbody.innerHTML = html;
  if (showAdd) document.getElementById('a-company').focus();
}

function toggleAddRow() { showAdd = !showAdd; renderTable(); }

function addRow() {
  const company = document.getElementById('a-company').value.trim();
  if (!company) { document.getElementById('a-company').focus(); return; }
  data.push({
    id: nextId++,
    company,
    jd: document.getElementById('a-jd').value.trim(),
    date: document.getElementById('a-date').value,
    status: document.getElementById('a-status').value,
    channel: document.getElementById('a-channel').value,
    channelType: document.getElementById('a-chtype').value,
    priority: document.getElementById('a-priority').value,
    networking: document.getElementById('a-net').value,
    note: document.getElementById('a-note').value.trim(),
  });
  save(); showAdd = false; renderTable();
}

function deleteRow(id) {
  if (!confirm('确认删除该条记录？')) return;
  data = data.filter(r=>r.id!==id); save(); renderTable();
}

function sortBy(key) {
  if (sortKey===key) sortDir*=-1; else { sortKey=key; sortDir=1; }
  renderTable();
}

function exportCSV() {
  const cols = ['公司','JD职位','投递日期','状态','投递渠道','渠道类型','优先级分类','Networking','备注'];
  const keys = ['company','jd','date','status','channel','channelType','priority','networking','note'];
  const rows = [cols.join(',')].concat(data.map(r=>keys.map(k=>`"${(r[k]||'').replace(/"/g,'""')}"`).join(',')));
  const blob = new Blob(['\ufeff'+rows.join('\n')], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = '求职追踪表.csv'; a.click();
}

document.getElementById('search-input').addEventListener('input', renderTable);
document.getElementById('filter-priority').addEventListener('change', renderTable);
document.getElementById('filter-status').addEventListener('change', renderTable);

renderTable();
</script>
</body>
</html>
